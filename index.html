  <style>

<body>
  <header>
    <div class="container header-inner">
      <div style="display: flex; align-items: center; gap: 0.75rem;">
        <span class="logo">📊</span>
        <h1>AI沟通质检与风险预警看板 (T+1)</h1>
      </div>
      <div class="toolbar">
        <input type="file" id="fileInput" accept=".xlsx,.xls" />
        <button type="button" class="btn btn-primary" id="uploadBtn">上传昨日沟通记录(Excel)</button>
        <div class="filters">
          <input type="date" id="dateStart" />
          <span>至</span>
          <input type="date" id="dateEnd" />

          </select>
          <select id="filterEmp">
            <option value="">全部员工</option>
          </select>
        </div>
      </div>
    </div>
    <div id="uploadError" class="container alert alert-warning" style="display: none;"></div>
  </header>

  <main class="container">
    <section class="cards">
      <div class="card">
        <div class="card-icon slate">💬</div>
        <div class="card-title">总会话数</div>
        <div class="card-value slate" id="metricTotal">0</div>
      </div>
      <div class="card">
        <div class="card-icon red">🔴 P0</div>
        <div class="card-title">P0 高危风险数</div>
        <div class="card-value red" id="metricP0">0</div>
      </div>
      <div class="card">
        <div class="card-icon amber">🟠 P1</div>
        <div class="card-title">P1 服务风险数</div>
        <div class="card-value amber" id="metricP1">0</div>
      </div>
      <div class="card">
        <div class="card-icon indigo">🤖</div>
        <div class="card-title">AI 预警准确率</div>
        <div class="card-value indigo" id="metricAccuracy">暂无</div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>风险会话明细</h2>
        <p>仅展示 P0 / P1 风险会话 · 日期/学部/员工与筛选联动</p>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>学部</th>
              <th>员工</th>
              <th>学员编号</th>
              <th>发生时间</th>
              <th>风险等级</th>
              <th>AI质检结论</th>
              <th>校验状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <div class="overlay" id="overlay"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-head">
      <div>
        <h3 id="drawerTitle">—</h3>
        <p style="margin: 0.25rem 0 0; font-size: 0.875rem; color: #64748b;" id="drawerSub">—</p>
      </div>
      <button type="button" class="btn btn-close" id="drawerClose">✕</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
    <div class="drawer-foot">
      <div class="summary" id="drawerSummary">—</div>
      <input type="text" id="reviewComment" placeholder="请填写纠偏理由(选填)..." />
      <div class="actions">
        <button type="button" class="btn btn-success" id="btnAccurate">确认违规</button>
        <button type="button" class="btn btn-secondary" id="btnFalsePositive">标记误报</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script>
(function () {
  'use strict';

  function normalizeDateStr(t) {
    if (t == null || t === '') return '';
    if (typeof t === 'object' && t instanceof Date && !Number.isNaN(t.getTime()))
      return t.toISOString().slice(0, 10);
    var s = String(t).trim();
    if (!s) return '';
    var num = Number(t);
    if (!Number.isNaN(num) && num > 0) {
      var date = new Date((num - 25569) * 86400 * 1000);
      if (!Number.isNaN(date.getTime())) {
        var y = date.getFullYear(), m = String(date.getMonth() + 1).padStart(2, '0'), d = String(date.getDate()).padStart(2, '0');
        return y + '-' + m + '-' + d;
      }
    }
    var match = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
    if (match) return match[1] + '-' + match[2].padStart(2, '0') + '-' + match[3].padStart(2, '0');
    if (s.length >= 10 && s[4] === '-' && s[7] === '-') return s.slice(0, 10);
    return '';
  }

  var NOISE = [
    function(c) { return /https?:\/\//i.test(String(c)); },
    function(c) { return String(c).trim().indexOf('!!') === 0; },
    function(c) { var x = String(c).trim(); return /^\[表情\]$/i.test(x) || /^\[.*表情.*\]$/i.test(x); }
  ];
  function cleanData(msgs) {
    if (!Array.isArray(msgs)) return [];
    return msgs.filter(function(m) {
      var c = m.content != null ? String(m.content).trim() : '';
      if (!c) return false;
      return !NOISE.some(function(fn) { return fn(c); });
    });
  }

  var P0_KW = ['退钱', '投诉', '12315', '骗子', '维权', '必须退', '马上退', '立刻退'];
  var P0_QUERY = ['退费流程', '怎么退', '如何退', '能否退'];
  var P1_KW = ['没办法', '呵呵', '随便', '自己看', '您要非这么想', '那我也没办法'];
  var CONFIRM = /对吧|好的|嗯|嗯嗯|收到|好哒|好的呢/;

  function isStudent(dir) { return String(dir).indexOf('学生') !== -1; }
  function isTeacher(dir) { return String(dir).indexOf('老师') !== -1; }

  function analyzeSession(messages) {
    var cleaned = cleanData(messages);
    var riskLevel = 'None', riskTags = [], aiSummary = '无风险会话', reasoning = '', highlightIds = [];
    var i, content, onlyQuery, hasDemand, teacherShortCount, msg, k, isShort;

    var teacherReplies = cleaned.filter(function(m) { return isTeacher(m.direction); });
    if (teacherReplies.length) {
      var allShort = teacherReplies.every(function(m) {
        var c = String(m.content || '').trim();
        return c.length < 10 && CONFIRM.test(c);
      });
      if (allShort) return { riskLevel: 'None', riskTags: [], aiSummary: '无效对话（无风险）', reasoning: '预过滤：对话均为简短确认用语，无实质性业务讨论。', highlightIds: [] };
    }

    for (i = 0; i < cleaned.length; i++) {
      msg = cleaned[i];
      if (!isStudent(msg.direction)) continue;
      content = String(msg.content || '');
      onlyQuery = P0_QUERY.some(function(k) { return content.indexOf(k) !== -1; }) && !P0_KW.some(function(k) { return content.indexOf(k) !== -1; });
      if (onlyQuery) continue;
      hasDemand = P0_KW.some(function(k) { return content.indexOf(k) !== -1; }) || (content.indexOf('退费') !== -1 && !/流程|怎么|如何|能否/.test(content));
      if (hasDemand) {
        riskLevel = 'P0'; riskTags.push('退费/投诉'); highlightIds.push(msg.id);
        aiSummary = '客户情绪激动，提及退费/投诉，需立即介入！';
        reasoning = 'P0 判定：学员消息「' + msg.id + '」中显式表达退款/投诉/维权意愿，非单纯流程咨询。';
        break;
      }
    }

    if (riskLevel === 'None') {
      teacherShortCount = 0;
      for (i = 0; i < cleaned.length; i++) {
        msg = cleaned[i];
        if (!isTeacher(msg.direction)) { teacherShortCount = 0; continue; }
        content = String(msg.content || '').trim();
        if (content.length < 10 && CONFIRM.test(content)) { teacherShortCount = 0; continue; }
        isShort = content.length <= 2 || /^[\u{1F300}-\u{1F9FF}]|[\u2600-\u26FF]|[\u2700-\u27BF]$/u.test(content);
        if (isShort) {
          teacherShortCount++;
          if (teacherShortCount >= 2) {
            riskLevel = 'P1'; riskTags.push('已读乱回'); highlightIds.push(msg.id);
            aiSummary = '顾问在学员提出具体问题后连续使用敷衍/短句回复，存在已读乱回风险。';
            reasoning = 'P1 判定：老师消息「' + msg.id + '」在业务问题后连续出现极短回复，构成实质性搁置。';
            break;
          }
        } else {
          teacherShortCount = 0;
          for (k = 0; k < P1_KW.length; k++) {
            if (content.indexOf(P1_KW[k]) !== -1) {
              riskLevel = 'P1'; riskTags.push('阴阳怪气'); highlightIds.push(msg.id);
              aiSummary = '顾问语气生硬或敷衍，存在阴阳怪气/推卸责任风险。';
              reasoning = 'P1 判定：老师消息「' + msg.id + '」中出现讽刺/推卸表述，导致学员问题被搁置或情绪恶化。';
              break;
            }
          }
          if (riskLevel === 'P1') break;
        }
      }
    }
    if (!reasoning) reasoning = '语境分析后未发现 P0/P1 触发条件，判定为无风险。';
    return { riskLevel: riskLevel, riskTags: riskTags, aiSummary: aiSummary, reasoning: reasoning, highlightIds: highlightIds };
  }

  function getRiskType(riskLevel, riskTags) {
    if (riskLevel === 'P0') return '退费';
    if (riskLevel !== 'P1') return null;
    return riskTags && riskTags.some(function(t) { return t === '敷衍回复' || t === '已读乱回'; }) ? '已读乱回' : '阴阳怪气';
  }

  var defaultSessions = [
    { id: 'S-001', department: '心理学部', employee: '汤冉冉', studentId: '4662561480', lastTime: '2026-03-16 15:30:03', riskLevel: 'P0', riskTags: ['退费危机'], riskType: '退费', aiSummary: '学员明确提出想要退费，顾问未安抚情绪，触发P0高危。', reasoning: 'P0 判定：学员消息「m4」中显式表达退钱/12315投诉等维权意愿。', highlightIds: ['m4'], reviewStatus: 'pending', reviewComment: '', status: 'open', chatHistory: [
      { id: 'm1', time: '15:27:18', direction: '老师->学生', content: '冉冉老师刚收到了你的作业' },
      { id: 'm2', time: '15:28:00', direction: '学生->老师', content: '老师，我想了解一下退费流程。' },
      { id: 'm3', time: '15:29:10', direction: '老师->学生', content: '你觉得没帮助我也没办法，退费自己去后台看规则。' },
      { id: 'm4', time: '15:30:03', direction: '学生->老师', content: '立刻给我退钱，不然我去12315投诉！' }
    ]},
    { id: 'S-002', department: '公职学部', employee: '陈宁07', studentId: '6961873872', lastTime: '2026-03-16 12:48:17', riskLevel: 'P1', riskTags: ['语气生硬'], riskType: '阴阳怪气', aiSummary: "销售回复敷衍，带有'呵呵'等引发负面情绪的词汇。", reasoning: 'P1 判定：老师消息「m2」中出现阴阳怪气表述。', highlightIds: ['m2'], reviewStatus: 'accurate', reviewComment: '确实阴阳怪气', status: 'closed', chatHistory: [
      { id: 'm1', time: '12:41:45', direction: '学生->老师', content: '老师，这个知识点我还是没听懂，能再讲一下吗？' },
      { id: 'm2', time: '12:42:50', direction: '老师->学生', content: '课上都讲过了，自己多看几遍回放吧呵呵。' }
    ]}
  ];

  function parseExcelToSessions(file, cb) {
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = new Uint8Array(e.target.result);
        var wb = XLSX.read(data, { type: 'array' });
        var sh = wb.Sheets[wb.SheetNames[0]];
        var rows = XLSX.utils.sheet_to_json(sh, { header: 1 });
        if (!rows.length) { cb([]); return; }
        var headers = rows[0].map(function(h) { return String(h || '').trim(); });
        var col = function(name) { var i = headers.indexOf(name); return i >= 0 ? i : -1; };
        var idxDept = col('学部'), idxEmp = col('员工'), idxUser = col('用户编号'), idxTime = col('沟通时间'), idxType = col('沟通发送类型'), idxContent = col('内容');
        if (idxDept < 0 || idxEmp < 0 || idxUser < 0 || idxTime < 0 || idxType < 0 || idxContent < 0) {
          cb(null, new Error('Excel 表头需包含：学部, 员工, 用户编号, 沟通时间, 沟通发送类型, 内容'));
          return;
        }
        var raw = [];
        for (var i = 1; i < rows.length; i++) {
          var r = rows[i];
          if (!r || !r.length) continue;
          raw.push({ 学部: r[idxDept] != null ? String(r[idxDept]).trim() : '', 员工: r[idxEmp] != null ? String(r[idxEmp]).trim() : '', 用户编号: r[idxUser] != null ? String(r[idxUser]).trim() : '', 沟通时间: r[idxTime] != null ? String(r[idxTime]).trim() : '', 沟通发送类型: r[idxType] != null ? String(r[idxType]).trim() : '', 内容: r[idxContent] != null ? String(r[idxContent]).trim() : '' });
        }
        var groups = {};
        raw.forEach(function(r) {
          var key = r.学部 + '_' + r.员工 + '_' + r.用户编号;
          if (!groups[key]) groups[key] = [];
          groups[key].push(r);
        });
        var sessions = [];
        var sessionIndex = 0;
        Object.keys(groups).forEach(function(key) {
          var list = groups[key];
          list.sort(function(a, b) { return (a.沟通时间 || '').localeCompare(b.沟通时间 || ''); });
          var parts = key.split('_');
          var 学部 = parts[0] || '', 员工 = parts[1] || '', 用户编号 = parts[2] || '';
          var lastRow = list[list.length - 1];
          var chatHistory = list.map(function(r, i) {
            return { id: 'm' + (i + 1), time: r.沟通时间, direction: r.沟通发送类型 || '未知', content: r.内容 };
          });
          var analysis = analyzeSession(chatHistory);
          var riskType = getRiskType(analysis.riskLevel, analysis.riskTags);
          sessionIndex++;
          sessions.push({
            id: 'S-' + String(sessionIndex).padStart(3, '0'),
            department: 学部, employee: 员工, studentId: 用户编号, lastTime: lastRow.沟通时间,
            riskLevel: analysis.riskLevel, riskTags: analysis.riskTags, riskType: riskType || '其他',
            aiSummary: analysis.aiSummary, reasoning: analysis.reasoning || '', highlightIds: analysis.highlightIds || [],
            reviewStatus: 'pending', reviewComment: '', status: 'open', chatHistory: chatHistory
          });
        });
        cb(sessions);
      } catch (err) {
        cb(null, err);
      }
    };
    reader.onerror = function() { cb(null, reader.error); };
    reader.readAsArrayBuffer(file);
  }

  var state = {
    sessions: defaultSessions.slice(),
    dateStart: '2026-03-16',
    dateEnd: '2026-03-17',
    filterDept: '',
    filterEmp: '',
    detailSession: null,
    reviewComment: ''
  };

  function getFiltered() {
    var list = state.sessions.filter(function(s) {
      if (state.filterDept && s.department !== state.filterDept) return false;
      if (state.filterEmp && s.employee !== state.filterEmp) return false;
      var d = normalizeDateStr(s.lastTime);
      if (d && (d < state.dateStart || d > state.dateEnd)) return false;
      return true;
    });
    return list;
  }

  function getRiskList() {
    return getFiltered().filter(function(s) { return s.riskLevel === 'P0' || s.riskLevel === 'P1'; });
  }

  function getMetrics() {
    var list = getFiltered();
    var total = list.length;
    var p0 = list.filter(function(s) { return s.riskLevel === 'P0'; }).length;
    var p1 = list.filter(function(s) { return s.riskLevel === 'P1'; }).length;
    var riskTotal = p0 + p1;
    var accurate = list.filter(function(s) { return (s.riskLevel === 'P0' || s.riskLevel === 'P1') && s.reviewStatus === 'accurate'; }).length;
    var accuracy = riskTotal > 0 ? Math.round((accurate / riskTotal) * 100) : null;
    return { total: total, p0: p0, p1: p1, accuracy: accuracy };
  }

  function render() {
    var metrics = getMetrics();
    document.getElementById('metricTotal').textContent = metrics.total;
    document.getElementById('metricP0').textContent = metrics.p0;
    document.getElementById('metricP1').textContent = metrics.p1;
    document.getElementById('metricAccuracy').textContent = metrics.accuracy != null ? metrics.accuracy + '%' : '暂无';

    var risks = getRiskList();
    var tbody = document.getElementById('tableBody');
    if (!risks.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty">当前筛选下暂无风险会话</td></tr>';
      return;
    }
    tbody.innerHTML = risks.map(function(s) {
      var statusText = s.reviewStatus === 'accurate' ? '✅ 准确' : s.reviewStatus === 'false_positive' ? '❌ 误判' : '待校验';
      var statusClass = s.reviewStatus === 'accurate' ? 'badge-ok' : s.reviewStatus === 'false_positive' ? 'badge-fp' : 'badge-pending';
      var levelClass = s.riskLevel === 'P0' ? 'badge-p0' : 'badge-p1';
      return '<tr>' +
        '<td>' + escapeHtml(s.department) + '</td>' +
        '<td>' + escapeHtml(s.employee) + '</td>' +
        '<td><code>' + escapeHtml(s.studentId) + '</code></td>' +
        '<td>' + escapeHtml(s.lastTime) + '</td>' +
        '<td><span class="badge ' + levelClass + '">' + escapeHtml(s.riskLevel) + '</span></td>' +
        '<td>' + escapeHtml(s.aiSummary) + '</td>' +
        '<td><span class="badge ' + statusClass + '">' + statusText + '</span></td>' +
        '<td><button type="button" class="btn-sm" data-id="' + escapeHtml(s.id) + '">查看详情</button></td>' +
      '</tr>';
    }).join('');

    tbody.querySelectorAll('.btn-sm').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = btn.getAttribute('data-id');
        var s = state.sessions.find(function(x) { return x.id === id; });
        if (s) openDrawer(s);
      });
    });
  }

  function escapeHtml(str) {
    if (str == null) return '';
    var s = String(str);
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function openDrawer(s) {
    state.detailSession = s;
    state.reviewComment = s.reviewComment || '';
    document.getElementById('drawerTitle').textContent = s.department + ' · ' + s.employee;
    document.getElementById('drawerSub').textContent = s.studentId + ' · 风险等级 ' + s.riskLevel;
    document.getElementById('drawerSummary').textContent = s.aiSummary;
    document.getElementById('reviewComment').value = state.reviewComment;

    var html = '';
    (s.chatHistory || []).forEach(function(msg) {
      var isTeacher = isTeacher(msg.direction);
      var isHighlight = (s.highlightIds || []).indexOf(msg.id) !== -1;
      var side = isTeacher ? 'right' : 'left';
      var bubbleClass = 'bubble ' + (isTeacher ? 'teacher' : 'student') + (isHighlight ? ' highlight' : '');
      html += '<div class="msg ' + side + '"><div class="' + bubbleClass + '"><div class="bubble-meta">' + escapeHtml(msg.time) + ' · ' + escapeHtml(msg.direction) + '</div><div>' + escapeHtml(msg.content) + '</div></div>';
      if (isHighlight && s.reasoning) html += '<div class="ai-tip">AI 建议：' + escapeHtml(s.reasoning) + '</div>';
      html += '</div>';
    });
    document.getElementById('drawerBody').innerHTML = html;
    document.getElementById('overlay').classList.add('open');
    document.getElementById('drawer').classList.add('open');
  }

  function closeDrawer() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
    state.detailSession = null;
  }

  function handleReview(status) {
    if (!state.detailSession) return;
    var id = state.detailSession.id;
    var comment = document.getElementById('reviewComment').value.trim();
    state.sessions = state.sessions.map(function(s) {
      if (s.id !== id) return s;
      var o = {};
      for (var k in s) if (s.hasOwnProperty(k)) o[k] = s[k];
      o.reviewStatus = status;
      o.reviewComment = comment;
      o.status = 'closed';
      return o;
    });
    closeDrawer();
    render();
  }

  function fillSelect(id, options, current) {
    var sel = document.getElementById(id);
    if (!sel) return;
    var first = sel.options[0];
    sel.innerHTML = '';
    if (first) sel.appendChild(first);
    options.forEach(function(opt) {
      var o = document.createElement('option');
      o.value = opt;
      o.textContent = opt;
      if (opt === current) o.selected = true;
      sel.appendChild(o);
    });
  }

  function updateFilters() {
    var list = state.sessions;
    var depts = Array.from(new Set(list.map(function(s) { return s.department; }).filter(Boolean))).sort();
    var emps = list.map(function(s) { return s.employee; }).filter(Boolean);
    if (state.filterDept) emps = list.filter(function(s) { return s.department === state.filterDept; }).map(function(s) { return s.employee; }).filter(Boolean);
    emps = Array.from(new Set(emps)).sort();
    fillSelect('filterDept', depts, state.filterDept);
    fillSelect('filterEmp', emps, state.filterEmp);
  }

  document.getElementById('uploadBtn').addEventListener('click', function() { document.getElementById('fileInput').click(); });

  document.getElementById('fileInput').addEventListener('change', function() {
    var file = this.files[0];
    this.value = '';
    document.getElementById('uploadError').style.display = 'none';
    if (!file) return;
    var el = document.getElementById('uploadBtn');
    el.disabled = true;
    el.textContent = '解析中...';
    parseExcelToSessions(file, function(sessions, err) {
      el.disabled = false;
      el.textContent = '上传昨日沟通记录(Excel)';
      if (err) {
        document.getElementById('uploadError').textContent = err.message || '解析失败';
        document.getElementById('uploadError').style.display = 'block';
        return;
      }
      if (sessions && sessions.length > 0) {
        state.sessions = sessions;
        var dates = sessions.map(function(s) { return normalizeDateStr(s.lastTime); }).filter(Boolean);
        if (dates.length > 0) {
          dates.sort();
          state.dateStart = dates[0];
          state.dateEnd = dates[dates.length - 1];
          document.getElementById('dateStart').value = state.dateStart;
          document.getElementById('dateEnd').value = state.dateEnd;
        }
      } else {
        state.sessions = defaultSessions.slice();
        document.getElementById('uploadError').textContent = '未解析到有效数据，已恢复默认示例。';
        document.getElementById('uploadError').style.display = 'block';
      }
      updateFilters();
      render();
    });
  });

  document.getElementById('dateStart').value = state.dateStart;
  document.getElementById('dateEnd').value = state.dateEnd;
  document.getElementById('dateStart').addEventListener('change', function() { state.dateStart = this.value; render(); });
  document.getElementById('dateEnd').addEventListener('change', function() { state.dateEnd = this.value; render(); });
  document.getElementById('filterDept').addEventListener('change', function() { state.filterDept = this.value; state.filterEmp = ''; updateFilters(); render(); });
  document.getElementById('filterEmp').addEventListener('change', function() { state.filterEmp = this.value; render(); });

  document.getElementById('overlay').addEventListener('click', closeDrawer);
  document.getElementById('drawerClose').addEventListener('click', closeDrawer);
  document.getElementById('btnAccurate').addEventListener('click', function() { handleReview('accurate'); });
  document.getElementById('btnFalsePositive').addEventListener('click', function() { handleReview('false_positive'); });

  updateFilters();
  render();
})();
  </script>
</body>
</html>
